<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        .check-ok  { color: #27ae60; font-size: 12px; }
        .check-err { color: #e74c3c; font-size: 12px; }
        .check-ing { color: #888;    font-size: 12px; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<h2>회원가입</h2>
<div th:if="${error}" th:text="${error}" style="color:red;"></div>

<form th:action="@{/account/register}" method="post" id="registerForm">

    <!-- 아이디 -->
    <div>
        <label>아이디</label><br>
        <input type="text" name="username" id="username"
               placeholder="아이디 입력" required
               oninput="checkUsername()">
        <span id="username-msg"></span>
    </div><br>

    <!-- 비밀번호 -->
    <div>
        <label>비밀번호</label><br>
        <input type="password" name="password" id="password"
               placeholder="비밀번호 입력" required>
    </div><br>

    <!-- 이메일 -->
    <div>
        <label>이메일</label><br>
        <input type="email" name="email" id="email"
               placeholder="이메일 입력" required
               oninput="checkEmail()">
        <span id="email-msg"></span>
    </div><br>

    <!-- 닉네임 -->
    <div>
        <label>닉네임</label><br>
        <input type="text" name="nickname" id="nickname"
               placeholder="닉네임 입력" required
               oninput="checkNickname()">
        <span id="nickname-msg"></span>
    </div><br>

    <button type="submit" id="submit-btn">가입하기</button>

</form>

<a th:href="@{/auth/login}">로그인으로</a>

<script>
let usernameOk = false;
let emailOk = false;
let nicknameOk = false;

// 디바운스 (입력 멈추고 500ms 후 체크)
function debounce(fn, delay) {
    let timer;
    return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
    };
}

// 아이디 중복체크
const checkUsername = debounce(function() {
    const val = document.getElementById('username').value.trim();
    const msg = document.getElementById('username-msg');

    if (val.length < 2) {
        msg.className = 'check-ing';
        msg.textContent = '2자 이상 입력해주세요.';
        usernameOk = false;
        return;
    }

    msg.className = 'check-ing';
    msg.textContent = '확인 중...';

    fetch(`/account/check/username?username=${encodeURIComponent(val)}`)
        .then(res => res.json())
        .then(isDuplicate => {
            if (isDuplicate) {
                msg.className = 'check-err';
                msg.textContent = '❌ 이미 사용 중인 아이디입니다.';
                usernameOk = false;
            } else {
                msg.className = 'check-ok';
                msg.textContent = '✅ 사용 가능한 아이디입니다.';
                usernameOk = true;
            }
        });
}, 500);

// 이메일 중복체크
const checkEmail = debounce(function() {
    const val = document.getElementById('email').value.trim();
    const msg = document.getElementById('email-msg');

    if (!val.includes('@')) {
        msg.className = 'check-ing';
        msg.textContent = '올바른 이메일 형식을 입력해주세요.';
        emailOk = false;
        return;
    }

    msg.className = 'check-ing';
    msg.textContent = '확인 중...';

    fetch(`/account/check/email?email=${encodeURIComponent(val)}`)
        .then(res => res.json())
        .then(isDuplicate => {
            if (isDuplicate) {
                msg.className = 'check-err';
                msg.textContent = '❌ 이미 사용 중인 이메일입니다.';
                emailOk = false;
            } else {
                msg.className = 'check-ok';
                msg.textContent = '✅ 사용 가능한 이메일입니다.';
                emailOk = true;
            }
        });
}, 500);

// 닉네임 중복체크
const checkNickname = debounce(function() {
    const val = document.getElementById('nickname').value.trim();
    const msg = document.getElementById('nickname-msg');

    if (val.length < 2) {
        msg.className = 'check-ing';
        msg.textContent = '2자 이상 입력해주세요.';
        nicknameOk = false;
        return;
    }

    msg.className = 'check-ing';
    msg.textContent = '확인 중...';

    fetch(`/account/check/nickname?nickname=${encodeURIComponent(val)}`)
        .then(res => res.json())
        .then(isDuplicate => {
            if (isDuplicate) {
                msg.className = 'check-err';
                msg.textContent = '❌ 이미 사용 중인 닉네임입니다.';
                nicknameOk = false;
            } else {
                msg.className = 'check-ok';
                msg.textContent = '✅ 사용 가능한 닉네임입니다.';
                nicknameOk = true;
            }
        });
}, 500);

// 폼 제출 시 최종 검증
document.getElementById('registerForm').addEventListener('submit', function(e) {
    if (!usernameOk) {
        e.preventDefault();
        alert('아이디 중복 확인을 완료해주세요.');
        return;
    }
    if (!emailOk) {
        e.preventDefault();
        alert('이메일 중복 확인을 완료해주세요.');
        return;
    }
    if (!nicknameOk) {
        e.preventDefault();
        alert('닉네임 중복 확인을 완료해주세요.');
        return;
    }
});
</script>

</body>
</html>
