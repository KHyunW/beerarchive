<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>

<h2>회원가입</h2>

<div th:if="${error}" th:text="${error}" style="color:red;"></div>

<form th:action="@{/account/register}" method="post">
    <label>아이디: <input type="text" name="username" required></label><br>
    <label>비밀번호: <input type="password" name="password" required></label><br>
    <label>이메일: <input type="email" name="email" required></label><br>
    <label>닉네임: <input type="text" name="nickname" required></label><br>
    <button type="submit">가입하기</button>
</form>

<a th:href="@{/auth/login}">이미 계정이 있으신가요? 로그인</a>

</body>
</html>
