<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>양조장 관리</title></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h2>양조장 관리</h2>

<form th:action="@{/admin/breweries}" method="get">
    <input type="text" name="keyword" placeholder="양조장 이름 검색" th:value="${keyword}">
    <button type="submit">검색</button>
</form>
<a th:href="@{/admin/breweries/register}">+ 양조장 등록</a>
<table>
    <thead>
        <tr>
            <th>번호</th><th>양조장 이름</th><th>수정</th><th>삭제</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="brewery : ${breweryList}">
            <td th:text="${brewery.breweryId}"></td>
            <td th:text="${brewery.breweryName}"></td>
            <td><a th:href="@{/admin/breweries/edit/{id}(id=${brewery.breweryId})}">수정</a></td>
            <td>
                <form th:action="@{/admin/breweries/delete/{id}(id=${brewery.breweryId})}" method="post">
                    <button type="submit" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>
<a th:href="@{/admin/dashboard}">대시보드로</a>
</body>
</html>
