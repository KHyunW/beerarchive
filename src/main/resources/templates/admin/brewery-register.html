<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>양조장 등록</title></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h2>양조장 등록 (관리자)</h2>
<div th:if="${error}" th:text="${error}" style="color:red;"></div>
<form th:action="@{/admin/breweries/register}" method="post">
    <label>양조장 이름 <input type="text" name="breweryName" required></label><br>
    <button type="submit">등록</button>
</form>
<a th:href="@{/admin/breweries}">목록으로</a>
</body>
</html>
