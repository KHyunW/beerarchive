<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>리뷰 관리</title></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h2>리뷰 관리</h2>
<table>
    <thead>
        <tr>
            <th>번호</th><th>맥주</th><th>작성자</th><th>별점</th><th>내용</th><th>삭제</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="review : ${reviewList}">
            <td th:text="${review.reviewId}"></td>
            <td th:text="${review.beerName}"></td>
            <td th:text="${review.nickname}"></td>
            <td th:text="${review.rating} + '★'"></td>
            <td th:text="${review.content}"></td>
            <td>
                <form th:action="@{/admin/reviews/delete/{id}(id=${review.reviewId})}" method="post">
                    <button type="submit" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>
<a th:href="@{/admin/dashboard}">대시보드로</a>
</body>
</html>
