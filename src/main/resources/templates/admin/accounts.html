<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>사용자 관리</title></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h2>사용자 관리</h2>

<form th:action="@{/admin/accounts}" method="get">
    <input type="text" name="keyword" placeholder="아이디 또는 닉네임 검색" th:value="${keyword}">
    <button type="submit">검색</button>
</form>
<table>
    <thead>
        <tr>
            <th>번호</th><th>아이디</th><th>이메일</th><th>닉네임</th><th>권한</th><th>삭제</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="account : ${accountList}">
            <td th:text="${account.accountId}"></td>
            <td th:text="${account.username}"></td>
            <td th:text="${account.email}"></td>
            <td th:text="${account.nickname}"></td>
            <td th:text="${account.role}"></td>
            <td>
                <form th:action="@{/admin/accounts/delete/{id}(id=${account.accountId})}" method="post">
                    <button type="submit" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>
<a th:href="@{/admin/dashboard}">대시보드로</a>
</body>
</html>
