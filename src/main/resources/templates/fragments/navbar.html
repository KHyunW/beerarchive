<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar">
    <a th:href="@{/beer/list}">🍺 맥주 목록</a>
    &nbsp;|&nbsp;
    <a th:href="@{/brewery/list}">🏭 양조장</a>
    &nbsp;|&nbsp;

    <!-- 로그인 여부에 따라 다르게 표시 -->
    <span th:if="${session.loginUser != null}">
        <span th:text="${session.loginUser.nickname}"></span>님
        &nbsp;|&nbsp;
        <a th:href="@{/mypage}">마이페이지</a>
        &nbsp;|&nbsp;
        <!-- 관리자 메뉴 -->
        <a th:if="${session.loginUser.role.name() == 'ROLE_ADMIN'}"
            th:href="@{/admin/dashboard}">관리자</a>
        <span th:if="${session.loginUser.role.name() == 'ROLE_ADMIN'}">&nbsp;|&nbsp;</span>
        <a th:href="@{/auth/logout}">로그아웃</a>
    </span>
    <span th:if="${session.loginUser == null}">
        <a th:href="@{/auth/login}">로그인</a>
        &nbsp;|&nbsp;
        <a th:href="@{/account/register}">회원가입</a>
    </span>
</nav>
<hr>
</body>
</html>
