spring.application.name=beerarchive
# server port 변경
server.port=9091
# DB 연결 url
spring.datasource.url=jdbc:mysql://localhost:3306/beerarchive
# DB 사용자 아이디
spring.datasource.username=root
# DB 사용자 비밀번호
spring.datasource.password=qwer1234
# Hibernate의 DDL(Data Definition Language) 자동 생성 설정
spring.jpa.hibernate.ddl-auto=update
# Hibernate SQL 쿼리 콘솔에 출력
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

file.upload-dir=uploads/beer-images
# file upload 경로 관리
#file.upload-dir=C:/upload/
